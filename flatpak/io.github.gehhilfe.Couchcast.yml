# Flatpak manifest for Couchcast.
#
# Runtime/SDK versions were current as of mid-2026 — verify against what is on
# Flathub (`flatpak remote-info flathub org.gnome.Platform`) before submitting,
# and keep the rust-stable extension branch equal to the GNOME runtime's
# freedesktop base version.
#
# Build & test locally:
#   1. cargo xtask cargo-sources        # regenerate cargo-sources.json from Cargo.lock
#   2. flatpak install flathub org.gnome.Platform//49 org.gnome.Sdk//49 \
#        org.freedesktop.Sdk.Extension.rust-stable//25.08 \
#        org.freedesktop.Platform.ffmpeg-full//25.08
#   3. flatpak run org.flatpak.Builder --user --install --force-clean \
#        build-dir flatpak/io.github.gehhilfe.Couchcast.yml
#   4. flatpak run org.flatpak.Builder --user --lint manifest \
#        flatpak/io.github.gehhilfe.Couchcast.yml
app-id: io.github.gehhilfe.Couchcast
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: couchcast

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/couchcast/cargo
    # H.264/H.265/AAC decoders come from the ffmpeg-full extension below.
    GST_PLUGIN_SYSTEM_PATH: /app/lib/gstreamer-1.0:/usr/lib/gstreamer-1.0

# Extra (patented) codecs for cheap HDMI dongles that emit H.264.
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    add-ld-path: '.'
    version: '25.08'
    autodelete: false

finish-args:
  # Windowing + GPU (GL / Vulkan) — a single fullscreen Wayland client under gamescope.
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Audio + camera nodes over PipeWire (this also grants the native PipeWire socket).
  - --socket=pulseaudio
  - --socket=pipewire
  # V4L2 capture nodes AND controllers/USB. There is no granular --device=v4l flag
  # in 2026, so raw /dev/video* access requires --device=all. This draws Flathub
  # reviewer scrutiny; see docs/PACKAGING.md for the justification and the Camera
  # portal alternative.
  - --device=all
  # ADB / adb-connect to the target device over the network.
  - --share=network
  # Bluetooth-HID backend (deferred) talks to BlueZ on the SYSTEM bus.
  - --system-talk-name=org.bluez

modules:
  - name: ffmpeg-extension-point
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/ffmpeg

  - name: couchcast
    buildsystem: simple
    sources:
      # For a Flathub submission this is the tagged release tarball/commit:
      - type: git
        url: https://github.com/gehhilfe/Couchcast.git
        tag: v0.1.0
      # Offline crate sources, generated by `cargo xtask cargo-sources`:
      - cargo-sources.json
      # For LOCAL builds, comment out the git source above and use:
      # - type: dir
      #   path: ..
    build-options:
      env:
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release -p couchcast
      - install -Dm755 target/release/couchcast /app/bin/couchcast
      - install -Dm644 data/io.github.gehhilfe.Couchcast.desktop
          /app/share/applications/io.github.gehhilfe.Couchcast.desktop
      - install -Dm644 data/io.github.gehhilfe.Couchcast.metainfo.xml
          /app/share/metainfo/io.github.gehhilfe.Couchcast.metainfo.xml
      - install -Dm644 data/icons/io.github.gehhilfe.Couchcast.svg
          /app/share/icons/hicolor/scalable/apps/io.github.gehhilfe.Couchcast.svg
