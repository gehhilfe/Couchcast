name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            libsdl3-dev libvulkan-dev vulkan-headers glslc \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            libglib2.0-dev libasio-dev libtomlplusplus-dev

      - name: Vendor Dear ImGui
        run: git clone --depth 1 --branch v1.92.1 https://github.com/ocornut/imgui.git third_party/imgui

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  metadata:
    name: appstream · desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validators
        run: sudo apt-get update && sudo apt-get install -y appstream desktop-file-utils

      - name: Validate MetaInfo
        run: appstreamcli validate --no-net data/io.github.gehhilfe.Couchcast.metainfo.xml

      - name: Validate desktop entry
        run: desktop-file-validate data/io.github.gehhilfe.Couchcast.desktop
